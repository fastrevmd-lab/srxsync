name: security

# Secret scan + Python SAST + dependency audit. Actions pinned to commit SHAs.
on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: gitleaks (secrets)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  python:
    name: bandit + pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install scanners (pinned, isolated)
        run: |
          pipx install bandit==1.9.4
          pipx install pip-audit==2.10.1
      - name: bandit (SAST, medium+ severity)
        run: bandit -r srxsync -ll
      - name: pip-audit (dependency CVEs, report-only)
        continue-on-error: true
        run: |
          python3 -m pip install --quiet . || true
          pip-audit || pip-audit --strict || true
